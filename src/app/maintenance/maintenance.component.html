<div class="maintenance-container">
    <div class="maintenance-card">
        <img src="assets/images/logo.png" alt="mobi.mapr" class="maintenance-logo">

        <div class="maintenance-icon-wrapper">
            <mat-icon class="maintenance-icon">build</mat-icon>
        </div>

        <h1>{{ 'MAINTENANCE.TITLE' | translate }}</h1>

        <p class="message">{{ 'MAINTENANCE.MESSAGE' | translate }}</p>

        <div class="checking-status">
            <mat-spinner diameter="20"></mat-spinner>
            <span>{{ 'MAINTENANCE.CHECKING' | translate }}</span>
        </div>

        <p class="info">{{ 'MAINTENANCE.INFO' | translate }}</p>
    </div>
</div>
