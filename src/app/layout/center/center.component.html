<!-- map.component.html -->
<div class="rounded-xl overflow-hidden h-full w-full relative">
  <div #mapContainer class="h-full w-full rounded-xl"></div>
  <!-- Nominatim Search - Hidden on mobile, shown on desktop -->
  <div class="hidden md:flex absolute top-0 left-0 right-auto bottom-auto z-[1000] p-3 min-w-[300px] max-w-[400px] items-center gap-2">
    <mat-form-field appearance="fill" class="search-form-field w-full rounded-full" >
      <mat-label>{{ 'map.search.label' | translate }}</mat-label>
      <input 
        #searchInput
        matInput 
        type="text" 
        [(ngModel)]="searchQuery"
        (input)="onSearchInput($event)"
        (keydown.enter)="onSearchSubmit()"
        [placeholder]="'map.search.placeholder' | translate"
        [matAutocomplete]="auto">
      <mat-icon matPrefix>search</mat-icon>
      <mat-autocomplete #auto="matAutocomplete" (optionSelected)="onLocationSelected($event)">
        <mat-option *ngFor="let result of searchResults" [value]="result">
          <span>{{ result.display_name }}</span>
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
  <!-- Loading indicator overlay -->
  <div class="map-loading-overlay" *ngIf="isMapLoading()">
    <div class="map-loading-content">
      <mat-spinner diameter="40"></mat-spinner>
      <p class="map-loading-text">{{ 'map.search.loading' | translate }}</p>
    </div>
  </div>
  <!-- Legend -->
  <div class="map-legend absolute top-0 left-0 md:bottom-0 md:left-0 md:right-auto md:top-auto" (click)="openLegendDialog()" [title]="'map.search.clickForInfo' | translate">
    <!-- Quality legend (A-F letters) -->
    <div class="legend-quality" *ngIf="isQualityMode">
      <div class="legend-items">
        <div class="legend-item-quality" *ngFor="let item of qualityColors">
          <div class="legend-circle" [style.background-color]="item.color">
            <span class="legend-letter">{{ item.letter }}</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Time legend (discrete color steps) -->
    <div class="legend-time" *ngIf="!isQualityMode">
      <div class="legend-steps">
        <div class="legend-step" *ngFor="let item of timeColors" [style.background-color]="item.color"></div>
      </div>
      <div class="legend-labels">
        <span class="legend-label">{{ 'map.legend.time.min0' | translate }}</span>
        <span class="legend-label">7</span>
        <span class="legend-label">15</span>
        <span class="legend-label">23</span>
        <span class="legend-label">30</span>
        <span class="legend-label">45</span>
        <span class="legend-label">45+</span>
      </div>
    </div>
  </div>

  <!-- Mobile Footer -->
  <div class="absolute bottom-0 left-0 right-0 md:hidden z-[999] bg-[var(--secondary-color)] border-t border-[var(--background-color)] py-2">
    <app-bottom></app-bottom>
  </div>

</div>
