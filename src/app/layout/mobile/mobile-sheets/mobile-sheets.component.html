<div
  class="fixed inset-0 z-[1060] flex flex-col justify-end pointer-events-none"
  role="dialog"
  aria-modal="true">
  <div
    class="absolute inset-0 bg-black/50 pointer-events-auto"
    (click)="mobileUi.closeSheet()"></div>
  <div
    class="relative pointer-events-auto w-full max-h-[85vh] bg-[var(--background-color)] rounded-t-3xl shadow-2xl flex flex-col overflow-hidden"
    (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between px-4 py-3 border-b border-[var(--primary-color)] border-opacity-20 shrink-0">
      <h2 class="text-lg font-semibold text-[var(--primary-color)]">{{ sheetTitle() }}</h2>
      <button
        type="button"
        class="p-2 rounded-full text-[var(--primary-color)] hover:opacity-80 transition-opacity"
        (click)="mobileUi.closeSheet(); $event.stopPropagation()"
        [attr.aria-label]="'dashboard.closeSidebar' | translate">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div class="flex-1 min-h-0 overflow-y-auto">
      @switch (mobileUi.sheet()) {
        @case ('stats') {
          <div class="h-[min(70vh,600px)] p-2">
            <app-stats class="block h-full" />
          </div>
        }
        @case ('analyze') {
          <app-mobile-analyze />
        }
      }
    </div>
  </div>
</div>
