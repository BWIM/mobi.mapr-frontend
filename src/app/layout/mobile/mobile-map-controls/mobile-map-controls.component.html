<div class="mobile-map-controls lg:hidden">
  @if (hasGroup()) {
    <button
      type="button"
      class="mobile-map-controls__btn"
      (click)="openGroupOverview()"
      [attr.aria-label]="'mobile.groupOverviewButton.label' | translate"
      [title]="'rail.groupOverview' | translate">
      <mat-icon class="text-2xl">hive</mat-icon>
    </button>
  }
  <button
    type="button"
    class="mobile-map-controls__btn"
    (click)="openStats()"
    [attr.aria-label]="'mobile.statsButton.label' | translate"
    [title]="'stats.title' | translate">
    <mat-icon class="text-2xl">leaderboard</mat-icon>
  </button>
</div>
