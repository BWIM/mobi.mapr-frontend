<div class="flex flex-col min-w-[90vw] sm:min-w-[500px] max-w-[95vw] sm:max-w-[600px]">
  <h2 mat-dialog-title class="text-2xl sm:text-3xl font-semibold text-[var(--primary-color)] mb-6 px-2">
    {{ 'rail.feedback.title' | translate }}
  </h2>
  
  <mat-dialog-content class="mat-typography py-4 px-2 sm:px-4">
    <form [formGroup]="feedbackForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <!-- Problem Description -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>{{ 'rail.feedback.problemLabel' | translate }}</mat-label>
        <textarea 
          matInput 
          formControlName="problem"
          rows="6"
          class="text-[var(--primary-color)]"
          [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('problem')}">
        </textarea>
        <mat-error *ngIf="isFieldInvalid('problem')">
          {{ getFieldError('problem') }}
        </mat-error>
      </mat-form-field>

      <!-- Email (Optional) -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>{{ 'rail.feedback.emailLabel' | translate }}</mat-label>
        <input 
          matInput 
          type="email"
          formControlName="email"
          class="text-[var(--primary-color)]"
          [ngClass]="{'ng-invalid ng-dirty': isFieldInvalid('email')}">
        <mat-error *ngIf="isFieldInvalid('email')">
          {{ getFieldError('email') }}
        </mat-error>
      </mat-form-field>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="p-4 rounded-lg bg-green-100 border border-green-400 text-green-800">
        <div class="flex items-center gap-2">
          <mat-icon class="text-green-600">check_circle</mat-icon>
          <span>{{ successMessage }}</span>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="p-4 rounded-lg bg-red-100 border border-red-400 text-red-800">
        <div class="flex items-center gap-2">
          <mat-icon class="text-red-600">error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>
      </div>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="px-2 sm:px-4 pt-4 mt-2 border-t border-black/12">
    <button mat-button (click)="onClose()" [disabled]="isLoading">
      {{ 'rail.feedback.cancel' | translate }}
    </button>
    <button 
      mat-raised-button 
      color="primary" 
      (click)="onSubmit()" 
      [disabled]="feedbackForm.invalid || isLoading"
      [class.opacity-50]="isLoading">
      <span *ngIf="!isLoading">{{ 'rail.feedback.submit' | translate }}</span>
      <span *ngIf="isLoading">{{ 'rail.feedback.sending' | translate }}</span>
    </button>
  </mat-dialog-actions>
</div>
