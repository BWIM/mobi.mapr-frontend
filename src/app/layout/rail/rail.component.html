<div class="h-full flex flex-col items-center py-4">
  <!-- Upper Section -->
  <div class="flex flex-col items-center gap-4">
    <!-- Logo and Logo Text stacked -->
    <div class="flex flex-col items-center gap-2">
      <img src="assets/images/logo.png" alt="Logo" class="w-auto h-16">
      <img src="assets/images/logo_name.png" alt="Logo Text" class="w-auto h-18">
    </div>
    
    <!-- Language Selector Button with Menu -->
    <button 
      [matMenuTriggerFor]="languageMenu"
      class="flex items-center gap-2">
      <span class="text-xl font-bold">{{ currentLang().toUpperCase() }}</span>
    </button>
    <mat-menu #languageMenu="matMenu">
      <button mat-menu-item 
              (click)="switchLanguage('de')"
              [class.selected-language]="currentLang() === 'de'">
        DE
      </button>
      <button mat-menu-item 
              (click)="switchLanguage('en')"
              [class.selected-language]="currentLang() === 'en'">
        EN
      </button>
    </mat-menu>
  </div>
  
  <!-- Filling Space -->
  <div class="flex-1"></div>
  
  <!-- Lower Section - Button Group -->
  <div class="flex flex-col items-center gap-2 bg-[var(--background-color)] rounded-full p-4 shadow-lg">
    <button matIconButton>
      <mat-icon>mail</mat-icon>
    </button>
    <button matIconButton>
      <mat-icon>question_mark</mat-icon>
    </button>
    @if (isLoggedIn()) {
      <button matIconButton (click)="navigateToUsersArea()" [attr.aria-label]="'rail.manageProjects' | translate">
        <mat-icon>person</mat-icon>
      </button>
    }
  </div>
</div>
