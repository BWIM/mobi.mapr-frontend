<div class="flex h-screen w-screen overflow-hidden bg-[var(--background-color)]">
  <!-- RAIL - Narrow left section -->
  <div class="flex-shrink-0 w-24 bg-[var(--secondary-color)]">
    <app-rail></app-rail>
  </div>

  <!-- LEFT PANEL - Expandable -->
  <div class="flex flex-col transition-all duration-300 ease-in-out relative"
       [class.w-80]="leftPanelExpanded()"
       [class.w-12]="!leftPanelExpanded()">
    @if (leftPanelExpanded()) {
      <div class="flex-1 overflow-auto bg-none">
        <app-left></app-left>
      </div>
      <div class="absolute top-1/2 right-0 transform -translate-y-1/2 z-10">
        <button 
          (click)="toggleLeftPanel()"
          class="p-2 hover:bg-none rounded transition-colors"
          [attr.aria-label]="'dashboard.collapseLeftPanel' | translate">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>
    } @else {
      <div class="flex-1 relative bg-none">
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
          <button 
            (click)="toggleLeftPanel()"
            class="p-2 hover:bg-none rounded transition-colors"
            [attr.aria-label]="'dashboard.expandLeftPanel' | translate">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
    }
  </div>

  <!-- CENTER AREA - Map and Credits -->
  <div class="flex-1 flex flex-col min-w-0 bg-[var(--secondary-color)]">
    <div class="flex-1 flex flex-col min-h-0 bg-[var(--background-color)] rounded-tr-3xl rounded-br-3xl">
    <!-- MAP - Main content area that grows to fill space, large, right corner rounded -->
      <div class="flex-1 min-h-0 p-4 rounded-1xl overflow-hidden">
        <app-center></app-center>
      </div>
      <!-- CREDITS - Footer at bottom -->
      <div class="flex-shrink-0 h-12">
        <app-bottom></app-bottom>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL - Expandable -->
  <div class="flex flex-col transition-all duration-300 ease-in-out relative z-0"
       [class.w-96]="rightPanelExpanded()"
       [class.w-12]="!rightPanelExpanded()">
    @if (rightPanelExpanded()) {
      <div class="flex-1 overflow-auto bg-[var(--secondary-color)]">
        <app-right></app-right>
      </div>
      <div class="absolute top-1/2 left-0 transform -translate-y-1/2 z-10">
        <button 
          (click)="toggleRightPanel()"
          class="p-2 hover:bg-none rounded transition-colors"
          [attr.aria-label]="'dashboard.collapseRightPanel' | translate">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
    } @else {
      <div class="flex-1 relative bg-[var(--secondary-color)]">
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
          <button 
            (click)="toggleRightPanel()"
            class="p-2 hover:bg-none rounded transition-colors"
            [attr.aria-label]="'dashboard.expandRightPanel' | translate">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </button>
        </div>
      </div>
    }
  </div>
</div>
