<div class="h-full p-4 bg-[var(--background-color)] text-[var(--primary-color)] relative flex flex-col rounded-2xl">
  <h2 class="text-lg font-semibold text-[var(--primary-color)] mb-2 leading-6">Top 10 Landkreise</h2>

  <div *ngIf="isLoading" class="flex-1 flex items-center justify-center text-[var(--primary-color)]">
    <p>Laden...</p>
  </div>
  
  <div *ngIf="error && !isLoading" class="flex-1 flex items-center justify-center text-red-500">
    <p>{{ error }}</p>
  </div>
  
  <ol *ngIf="!isLoading && !error" class="list-decimal pl-6 m-0 flex-1 text-[var(--primary-color)] leading-[1.8]">
    <li *ngFor="let county of filteredCounties; let i = index" class="mb-2 flex justify-between items-center text-[var(--primary-color)]">
      <span class="flex-1">{{ county.name }}</span>
      <span class="ml-2 font-medium">({{ getRating(county.index) }})</span>
    </li>
    <li *ngIf="filteredCounties.length === 0" class="text-sm text-[var(--primary-color)] opacity-70">
      Keine Daten verfügbar
    </li>
  </ol>

  <button class="absolute bottom-4 right-4 w-7 h-7 rounded-full bg-[var(--secondary-color)] text-[var(--primary-color)] border-none cursor-pointer flex items-center justify-center transition-all duration-200 text-sm hover:opacity-80 hover:scale-105" title="Information">
    <span class="material-icons text-sm leading-none">info</span>
  </button>
</div>
