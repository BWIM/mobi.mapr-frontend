<div class="w-full max-w-full h-[85vh] flex flex-col relative">
  <!-- Overlay Close Button -->
  <button 
    type="button"
    class="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-[var(--primary-color)] cursor-pointer flex items-center justify-center z-[1000] shadow-lg transition-all duration-200 ease-in-out hover:scale-110 hover:shadow-xl active:scale-95 border-[var(--background-color)] border-2"
    (click)="onClose()"
    aria-label="Close">
    <span class="text-[var(--secondary-color)] text-[28px] font-bold leading-none m-0 p-0">×</span>
  </button>
  
  <h2 mat-dialog-title class="text-2xl font-bold text-white mb-4">
    {{ categoryName }}
  </h2>
  
  <mat-dialog-content class="mat-typography flex-1 overflow-hidden py-4 flex flex-col">
    <!-- Map Content - Always rendered, covered by overlay when loading/error -->
    <div class="relative w-full h-full">
      <div #mapContainerPlaces class="w-full h-full"></div>
      
      <!-- Loading State Overlay -->
      <div *ngIf="isLoading" class="absolute inset-0 bg-[var(--background-color)] bg-opacity-95 text-sm text-[var(--primary-color)] flex items-center justify-center" style="z-index: 2000;">
        <div class="flex flex-col items-center gap-4">
          <mat-spinner diameter="40"></mat-spinner>
          <p>{{ 'analyze.placesDialog.loading' | translate }}</p>
        </div>
      </div>
      
      <!-- Error State Overlay -->
      <div *ngIf="error && !isLoading" class="absolute inset-0 bg-[var(--background-color)] bg-opacity-95 text-sm text-[var(--primary-color)] py-4 text-center flex items-center justify-center" style="z-index: 2000;">
        <div class="px-4">{{ error }}</div>
      </div>
      
      <!-- Legend Overlay -->
      <div
        *ngIf="categoryLegendItems.length > 0 && !isLoading && !error"
        class="absolute top-0 left-0 z-[1000] max-w-[min(100%,18rem)] bg-[var(--background-color)] bg-opacity-75 rounded-lg pointer-events-auto"
        [style.max-height]="categoryLegendExpanded ? 'calc(100% - 0.5rem)' : null"
        [style.overflow-y]="categoryLegendExpanded ? 'auto' : null">
        <button
          type="button"
          class="flex items-center justify-between gap-2 w-full p-2 text-[var(--primary-color)] border-0 bg-transparent cursor-pointer"
          (click)="toggleCategoryLegendExpanded()"
          [attr.aria-expanded]="categoryLegendExpanded"
          [attr.aria-label]="(categoryLegendExpanded ? 'mobile.analyze.legend.collapse' : 'mobile.analyze.legend.expand') | translate">
          <span class="text-xs font-semibold">{{ 'analyze.categories' | translate }}</span>
          <mat-icon class="text-lg shrink-0">
            {{ categoryLegendExpanded ? 'expand_less' : 'expand_more' }}
          </mat-icon>
        </button>
        <div *ngIf="categoryLegendExpanded" class="flex flex-col gap-1.5 px-2 pb-2">
          <button
            type="button"
            *ngFor="let item of categoryLegendItems"
            class="flex items-start gap-2 text-left w-full p-0 border-0 bg-transparent cursor-pointer hover:opacity-80 transition-opacity"
            [class.opacity-50]="!item.enabled"
            (click)="toggleCategory(item.name)">
            <span
              class="w-3.5 h-3.5 rounded-full flex-shrink-0 mt-0.5 border border-black/30"
              [style.background-color]="item.color"></span>
            <span class="text-[var(--primary-color)] text-[11px] leading-snug min-w-0">
              {{ item.name }}
              <span class="opacity-90" title="{{ 'analyze.placesDialog.categoryRelevanceInfo' | translate }}">
                · {{ item.weight }} · {{ item.relevance | number:'1.0-1' }}%
              </span>
              <span [style.color]="getPlacesMetricTextColor(item.score, item.index)">
                <ng-container *ngIf="getPlacesIsScoreMode(); else dialogIndexMode">
                  · {{ (item.score / 60) | number:'1.1-1' }} {{ 'map.popup.minutes' | translate }}
                </ng-container>
                <ng-template #dialogIndexMode>
                  · {{ getGradeFromIndex(item.index) }}
                </ng-template>
              </span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <!-- Bottom Section - Color scale legend (like personas dialog) -->
  <div class="flex-shrink-0 border-t border-[var(--primary-color)] border-opacity-30 pt-4 px-4 pb-2 min-h-[80px]" *ngIf="!isLoading && !error">
    <div class="flex h-full items-center gap-4">
      <div class="flex-1 cursor-pointer" (click)="openLegendInfo()">
        <!-- Quality legend (A-F letters) -->
        <div class="w-full" *ngIf="!getPlacesIsScoreMode()">
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full flex items-center justify-center border border-white/40" *ngFor="let item of qualityColors" [style.background-color]="item.color">
              <span class="text-sm font-bold text-white">{{ item.letter }}</span>
            </div>
          </div>
        </div>

        <!-- Time legend (discrete color steps) -->
        <div class="w-full" *ngIf="getPlacesIsScoreMode() && hasScoreColors()">
          <div class="flex flex-col gap-2 w-full">
            <div class="flex w-full h-3 overflow-hidden rounded">
              <div class="flex-1" *ngFor="let item of timeLegendItems()" [style.background-color]="item.color"></div>
            </div>
            <div class="flex justify-between">
              <span class="text-xs text-white flex-1 min-w-0 text-center" *ngFor="let item of timeLegendItems()">
                {{ item.segmentLabel }}
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Category relevance explanation -->
      <div class="w-[260px] max-w-[40%] text-sm leading-snug text-white/90 bg-[var(--background-color)] bg-opacity-70 border border-[var(--primary-color)] border-opacity-30 rounded px-2 py-2">
        {{ 'analyze.placesDialog.categoryRelevanceInfo' | translate }}
      </div>
    </div>
  </div>
</div>
