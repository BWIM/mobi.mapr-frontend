<div class="w-full max-w-full h-[85vh] flex flex-col relative">
  <!-- Overlay Close Button -->
  <button 
    type="button"
    class="absolute -top-4 -right-4 w-10 h-10 rounded-full bg-[var(--primary-color)] cursor-pointer flex items-center justify-center z-[1000] shadow-lg transition-all duration-200 ease-in-out hover:scale-110 hover:shadow-xl active:scale-95 border-[var(--background-color)] border-2"
    (click)="onClose()"
    aria-label="Close">
    <span class="text-[var(--secondary-color)] text-[28px] font-bold leading-none m-0 p-0">×</span>
  </button>
  
  <h2 mat-dialog-title class="text-2xl font-bold text-white mb-4">
    {{ categoryName }}
  </h2>
  
  <mat-dialog-content class="mat-typography flex-1 overflow-hidden py-4 flex flex-col">
    <!-- Map Content - Always rendered, covered by overlay when loading/error -->
    <div class="relative w-full h-full">
      <div #mapContainerPlaces class="w-full h-full"></div>
      
      <!-- Loading State Overlay -->
      <div *ngIf="isLoading" class="absolute inset-0 bg-[var(--background-color)] bg-opacity-95 text-sm text-[var(--primary-color)] flex items-center justify-center" style="z-index: 2000;">
        <div class="flex flex-col items-center gap-4">
          <mat-spinner diameter="40"></mat-spinner>
          <p>{{ 'analyze.placesDialog.loading' | translate }}</p>
        </div>
      </div>
      
      <!-- Error State Overlay -->
      <div *ngIf="error && !isLoading" class="absolute inset-0 bg-[var(--background-color)] bg-opacity-95 text-sm text-[var(--primary-color)] py-4 text-center flex items-center justify-center" style="z-index: 2000;">
        <div class="px-4">{{ error }}</div>
      </div>
      
      <!-- Legend Overlay -->
      <div *ngIf="categoryLegendItems.length > 0 && !isLoading && !error" class="absolute top-0 left-0 bg-[var(--background-color)] bg-opacity-75 p-3" style="z-index: 1000;">
        <div class="text-[var(--primary-color)] text-sm font-semibold mb-2">{{ 'analyze.categories' | translate }}</div>
        <div class="flex flex-col gap-2">
          <div *ngFor="let item of categoryLegendItems" 
               class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity"
               (click)="toggleCategory(item.name)"
               [class.opacity-50]="!item.enabled">
            <div class="w-4 h-4 rounded-full border-2 border-[var(--primary-color)] flex-shrink-0" [style.background-color]="item.color"></div>
            <span class="text-[var(--primary-color)] text-xs">
              {{ item.name }} ({{ item.relevance.toFixed(1) }}%)
            </span>
          </div>
        </div>
      </div>
    </div>
  </mat-dialog-content>
</div>
