<div class="w-full max-w-full h-[80vh] flex flex-col">
  <h2 mat-dialog-title class="text-2xl font-bold text-white mb-4 flex-shrink-0">
    {{ data.featureName || 'Aktivitäten' }}
  </h2>
  
  <mat-dialog-content class="mat-typography flex-[4] min-h-0 overflow-hidden py-4 px-4 flex flex-col">
    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-sm text-[var(--primary-color)] py-4 text-center flex-shrink-0">
      <mat-spinner diameter="40" class="mx-auto mb-4"></mat-spinner>
      Lade alle Kategorien...
    </div>
    
    <!-- Error State -->
    <div *ngIf="error && !isLoading" class="text-sm text-red-600 py-4 text-center flex-shrink-0">
      {{ error }}
    </div>
    
    <!-- Chart and Categories -->
    <div *ngIf="allCategories.length > 0 && !isLoading && !error" class="w-full flex flex-col flex-1 min-h-0">
      <!-- Chart Container - Takes most of the space (about 70%) -->
      <div class="flex-[4] min-h-0 mb-3 w-full chart-wrapper">
        <div class="relative w-full h-full">
          <p-chart #allCategoriesChart type="bar" [data]="chartData" [options]="chartOptions" (onDataSelect)="onChartDataSelect($event)" style="cursor: pointer;"></p-chart>
        </div>
      </div>
      
      <!-- Category Labels List - Multicolumn Layout with scroll (about 10%) -->
      <div class="category-labels-container flex-[3] min-h-0 overflow-y-auto">
        <div class="category-labels columns-2 md:columns-3 lg:columns-4 space-y-2">
          <div *ngFor="let category of allCategories; let i = index" 
               class="category-item text-sm text-white flex items-center mb-2">
            <span class="font-bold mr-2">{{ i + 1 }}.</span>
              <span>{{ category.category_name }}</span>
          </div>
        </div>
      </div>
    </div>
  </mat-dialog-content>

  <!-- Bottom Section - 20% with Legend -->
  <div class="flex-[0] flex-shrink-0 border-t border-[var(--primary-color)] border-opacity-30 pt-4 px-4 pb-2 min-h-[100px]">
    <div class="flex h-full gap-6">
      <!-- Legend -->
      <div class="flex-1 flex items-center">
        <!-- Quality legend (A-F letters) -->
        <div class="legend-quality w-full" *ngIf="!data.isScoreMode">
          <div class="flex items-center gap-2">
            <div class="legend-item-quality" *ngFor="let item of qualityColors">
              <div class="legend-circle" [style.background-color]="item.color">
                <span class="legend-letter">{{ item.letter }}</span>
              </div>
            </div>
            <mat-icon class="text-[var(--primary-color)] cursor-pointer" (click)="openLegendInfo()" matTooltip="Mehr Informationen">info</mat-icon>
          </div>
        </div>
        <!-- Time legend (color gradient) -->
        <div class="legend-time w-full" *ngIf="data.isScoreMode">
          <div class="flex flex-col gap-2">
            <div class="legend-gradient">
              <div class="gradient-bar" [style.background]="getTimeGradient()"></div>
            </div>
            <div class="legend-labels flex justify-between">
              <span class="legend-label text-xs text-white">0 min</span>
              <span class="legend-label text-xs text-white">60+ min</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <mat-dialog-actions align="end" class="mt-2 flex-shrink-0">
    <button mat-button (click)="onClose()">Schließen</button>
  </mat-dialog-actions>
</div>
