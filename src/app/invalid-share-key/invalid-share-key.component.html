<div class="invalid-share-key-container">
    <div class="invalid-share-key-card">
        <div class="error-icon-wrapper">
            <mat-icon class="error-icon">link_off</mat-icon>
        </div>

        <h1>{{ 'INVALID_SHARE_KEY.TITLE' | translate }}</h1>

        <p class="message">{{ 'INVALID_SHARE_KEY.MESSAGE' | translate }}</p>

        <div class="actions">
            <button mat-flat-button color="primary" class="action-button" (click)="goToLogin()">
                {{ 'INVALID_SHARE_KEY.GO_TO_LOGIN' | translate }}
            </button>
            <button mat-stroked-button class="action-button secondary" (click)="goToLanding()">
                {{ 'INVALID_SHARE_KEY.GO_TO_LANDING' | translate }}
            </button>
        </div>
    </div>
</div>
