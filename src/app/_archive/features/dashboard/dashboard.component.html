<app-dashboard-layout>
  <!-- Left Sidebar Content -->
  <div leftSidebar class="h-full">
    <app-projects></app-projects>
  </div>

  <!-- Header Content -->
  <div header class="flex items-center gap-4">
    <!-- Logo click handler can be added here if needed -->
    <button mat-icon-button (click)="zoomToFeatures()" title="Recenter map">
      <mat-icon>my_location</mat-icon>
    </button>
  </div>

  <!-- Main Content (Map) -->
  <app-map-v2></app-map-v2>

  <!-- Right Sidebar Content -->
  <div rightSidebar class="h-full">
    <app-details-sidebar></app-details-sidebar>
  </div>
</app-dashboard-layout>

<app-loading-spinner></app-loading-spinner>
