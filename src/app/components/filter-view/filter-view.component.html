<div class="filter-view-container">
  <!-- Modi (Modes) - Stacked icons -->
  <div class="filter-section">
    <h3 class="filter-headline">Modi</h3>
    <div class="filter-icons-stacked">
      @for (mode of modes; track mode.id) {
        <button
          mat-icon-button
          [class.selected]="isModeSelected(mode.id)"
          (click)="toggleMode(mode.id)"
          [title]="mode.label"
          class="filter-icon-button">
          <mat-icon>{{ mode.icon }}</mat-icon>
        </button>
      }
    </div>
  </div>

  <!-- Bewertung (Evaluation) - Toggle -->
  <div class="filter-section">
    <h3 class="filter-headline">Bewertung</h3>
    <div class="evaluation-toggle-container">
      <mat-button-toggle-group [value]="evaluationType" (change)="setEvaluationType($event.value)" class="evaluation-toggle-group">
        @for (option of evaluationOptions; track option.value) {
          <mat-button-toggle [value]="option.value" class="evaluation-toggle" [title]="option.label">
            <mat-icon>{{ option.icon }}</mat-icon>
          </mat-button-toggle>
        }
      </mat-button-toggle-group>
    </div>
  </div>

  <!-- Erweiterte Filter Button -->
  <div class="advanced-filters-section">
    <button mat-icon-button class="advanced-filters-button" (click)="openAdvancedFilters()" title="Erweiterte Filter">
      <mat-icon>tune</mat-icon>
    </button>
  </div>
</div>
