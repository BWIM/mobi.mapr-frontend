<div class="icon-rail">
  <div class="icon-rail-bottom">
    <!-- Questions / Help -->
    <button
      mat-fab
      class="icon-rail-button"
      type="button"
      (click)="onHelp()"
      aria-label="Hilfe">
      <mat-icon>help_outline</mat-icon>
    </button>

    <!-- Language select -->
    <button
      mat-fab
      class="icon-rail-button"
      type="button"
      (click)="onLanguage()"
      aria-label="Sprache">
      <mat-icon>translate</mat-icon>
    </button>

    <!-- Notifications -->
    <button
      mat-fab
      class="icon-rail-button"
      type="button"
      (click)="onNotifications()"
      aria-label="Benachrichtigungen">
      <mat-icon>notifications</mat-icon>
    </button>

    <!-- Profile -->
    <button
      mat-fab
      class="icon-rail-button"
      type="button"
      (click)="onProfile()"
      aria-label="Profil">
      <mat-icon>account_circle</mat-icon>
    </button>
  </div>
</div>
