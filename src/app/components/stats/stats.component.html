<div class="stats-container">
  <div class="stats-header">
    <h3>Top-Listen</h3>
    <button mat-icon-button title="Info" class="text-white">
      <mat-icon>info</mat-icon>
    </button>
  </div>

  <!-- Population Filter -->
  <div class="population-filter-section">
    <p class="filter-label">nach Bevölkerung filtern</p>
    <div class="population-filters">
      @for (filter of populationFilters; track filter.value) {
        <button
          class="filter-button"
          [class.active]="populationFilter === filter.value"
          (click)="onPopulationFilterChange(filter.value)">
          {{ filter.label }}
        </button>
      }
    </div>
  </div>

  <!-- Top 10 Regions List -->
  <div class="top-list-section">
    <div class="top-regions-header">
      <h4>10 Top-Regionen</h4>
      <button mat-icon-button title="Info" class="info-button-small">
        <mat-icon>info</mat-icon>
      </button>
    </div>
    <div class="top-list">
      @for (item of topListItems; track item.rank) {
        <div
          class="list-item"
          [class.selected]="selectedItem?.name === item.name"
          (click)="onItemClick(item)">
          <span class="rank">{{ item.rank }}.</span>
          <span class="name">{{ item.name }}</span>
        </div>
      }
    </div>
  </div>
</div>
