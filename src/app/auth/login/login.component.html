<div class="login-container">
  <mat-card class="login-card">
    <div class="login-header">
      <img src="assets/images/logo.png" alt="Logo" class="login-logo">
      <h2>{{ 'auth.login.title' | translate }}</h2>
    </div>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>{{ 'auth.login.username' | translate }}</mat-label>
          <input matInput id="username" type="text" formControlName="username" autocomplete="username">
          <mat-error *ngIf="getFieldError('username')">{{ getFieldError('username') }}</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>{{ 'auth.login.password' | translate }}</mat-label>
          <input
            matInput
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            autocomplete="current-password">
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="getFieldError('password')">{{ getFieldError('password') }}</mat-error>
        </mat-form-field>

        <p class="login-error" *ngIf="error">{{ error }}</p>

        <button
          mat-flat-button
          color="primary"
          type="submit"
          class="login-button"
          [disabled]="loginForm.invalid || isLoading">
          <mat-spinner *ngIf="isLoading" diameter="20" class="login-spinner"></mat-spinner>
          <span *ngIf="!isLoading">{{ 'auth.login.loginButton' | translate }}</span>
        </button>
      </form>

      <div class="language-selector">
        <mat-icon class="language-icon">language</mat-icon>
        <mat-form-field appearance="outline" class="language-field">
          <mat-label>{{ 'auth.login.selectLanguage' | translate }}</mat-label>
          <mat-select [value]="currentLang" (selectionChange)="onLanguageChange($event)">
            <mat-option *ngFor="let lang of languages" [value]="lang.code">
              {{ lang.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>
</div>
